<div class="header-container">
  <div class="logo">
    <img src="images/logo.png" height="40" class="mr-2" alt="Logo">
  </div>

  <ul class="header-links">
    <li *ngFor="let item of items" (click)="setActive(item.id)" [class.active]="selectedItem === item.id">
      {{item.label}}
    </li>
  </ul>

  <div class="header-actions">
    <button class="btn-demo">Request a Demo</button>
    <button class="btn-login">Login</button>
  </div>
</div>
