<div class="card-container">
  <div class="card-icon">
    <i [class]="icon"></i>
  </div>
  <div class="card-content">
    <h3 class="card-title">{{ title }}</h3>
    <p class="card-description">{{ description }}</p>
  </div>
  <div class="card-action" *ngIf="actionLabel">
    <app-button [label]="actionLabel"></app-button>
  </div>
</div>
